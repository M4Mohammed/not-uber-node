services:
  db:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: not-uber

    ports:
      - "5432:5432"

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 1s
      timeout: 5s
      retries: 5

  cache:
    image: redis:latest
    restart: always
    ports:
      - '6379:6379'

    command: redis-server --save 20 1 --loglevel warning
    environment:
      REDIS_HOST: cache
      REDIS_PORT: 6379
    volumes:
      - cache:/data

volumes:
  db:
    driver: local
  cache:
    driver: local